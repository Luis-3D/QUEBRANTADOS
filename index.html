<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Escanéame - Tengo algo para ti</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color:white;
    text-align:center;

    background:
    linear-gradient(rgba(0,0,0,0.70), rgba(0,0,0,0.70)),
    url('https://images.unsplash.com/photo-1603575448878-868a20723f1f');
    background-size:cover;
    background-position:center;
}

.card{
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(10px);
    padding:45px;
    border-radius:20px;
    max-width:800px;
    box-shadow: 0 15px 50px rgba(0,0,0,0.7);
}

h2{
    letter-spacing:4px;
    font-weight:300;
    margin-bottom:10px;
    opacity:0.9;
}

h1{
    font-size:42px;
    margin-bottom:25px;
}

#frase{
    font-size:27px;
    line-height:1.7;
    margin-top:20px;
}

button{
    margin-top:35px;
    padding:14px 28px;
    border:none;
    background:white;
    color:#203a43;
    font-size:16px;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
    <h2>QUEBRANTADOS</h2>
    <h1>Escanéame 🤍<br>Tengo algo para ti</h1>
    <div id="frase"></div>
    <button onclick="nuevaFrase()">Leer otra frase</button>
</div>

<script>
const frases = [
"No estás solo. Dios sigue contigo, incluso aquí. — Isaías 41:10",
"Respira… esto también va a pasar. — Lamentaciones 3:22-23",
"Dios aún tiene planes hermosos para ti. — Jeremías 29:11",
"Eres más fuerte de lo que hoy sientes. — Filipenses 4:13",
"Un mal día no define tu vida. — Salmos 30:5",
"Dios está trabajando, aunque no lo veas. — Romanos 8:28",
"No te rindas ahora. Lo mejor aún viene. — Gálatas 6:9",
"Dios conoce tu carga y camina contigo. — Salmos 55:22",
"Tu historia aún no termina aquí. — Filipenses 1:6",
"Aunque hoy no entiendas, puedes confiar. — Proverbios 3:5",
"Dios sigue siendo tu refugio seguro. — Salmos 46:1",
"Después de esto, vendrá algo mejor. — 2 Corintios 4:17"
];

function nuevaFrase(){
    const random = Math.floor(Math.random() * frases.length);
    document.getElementById("frase").innerText = frases[random];
}

nuevaFrase();
</script>

</body>
</html>
